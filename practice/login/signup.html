<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIp Page</title>
</head>
<body>
<fieldset>
    <legend>Sign Up</legend> <br>
    <form action="">
        <div class="email">
            <label for="email">--Email--</label><br>
            <input type="email" name="email" id="email" placeholder="example@gmail.com" required> <br> 
        </div>
        <div class="password">
            <label for="password">--Password--</label><br>
            <input type="password" id="password" placeholder="Create Password" required> <br> 
        </div>
        <div class="password">
            <input type="password" id="password" placeholder="Confirm Password" required>
        </div><br>
        <button type="submit">Sign Up</button> <br> <br>
        <a href="login.html">Already have an account? Login</a>
        <p>-----------------Or---------------------------</p>
        <button>Sign Up with Facebook</button><br><br>
        <button>Sign Up with Google</button>
    </form>
</fieldset>    
</body>
</html>
